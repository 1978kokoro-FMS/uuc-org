<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>의왕도시공사 조직도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f5f6fa; color: #222; }

  /* 상단 헤더 */
  .header { background: #1a3a5c; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .header .subtitle { font-size: 12px; opacity: 0.7; margin-top: 2px; }

  /* 탭 */
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e0e4ef; padding: 0 24px; }
  .tab { padding: 12px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; font-weight: 500; }
  .tab.active { border-bottom-color: #1a3a5c; color: #1a3a5c; font-weight: 600; }

  /* 검색바 */
  .search-bar { background: #fff; padding: 14px 24px; border-bottom: 1px solid #e0e4ef; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .search-input-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-input-wrap input { width: 100%; padding: 9px 36px 9px 12px; border: 1px solid #d0d5e8; border-radius: 6px; font-size: 14px; font-family: inherit; outline: none; }
  .search-input-wrap input:focus { border-color: #1a3a5c; }
  .search-input-wrap .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; font-size: 16px; line-height: 1; }
  .filter-select { padding: 9px 12px; border: 1px solid #d0d5e8; border-radius: 6px; font-size: 14px; font-family: inherit; outline: none; background: #fff; color: #222; cursor: pointer; }
  .result-count { font-size: 13px; color: #888; white-space: nowrap; }

  /* ───── 인명부 탭 ───── */
  #tab-list { display: block; }
  .person-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; padding: 16px 24px; }
  .person-card {
    background: #fff; border: 1px solid #e4e8f0; border-radius: 10px;
    padding: 14px 16px; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .person-card:hover { box-shadow: 0 2px 10px rgba(26,58,92,0.12); border-color: #b0bcd8; }
  .person-card.highlight { border-color: #f5a623; box-shadow: 0 0 0 2px #f5a62340; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .avatar.grade-임원 { background: #fde8c8; color: #a0540a; }
  .avatar.grade-처장 { background: #ddeaff; color: #1a3a8c; }
  .avatar.grade-팀장 { background: #d9f4e8; color: #0d6b3e; }
  .avatar.grade-일반 { background: #f0eefd; color: #4a3ab0; }
  .avatar.grade-공무직 { background: #f5f0e8; color: #7a6030; }
  .avatar.grade-계약직 { background: #fce8ec; color: #9c2030; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-title { font-size: 12px; color: #1a3a5c; background: #e8eef8; display: inline-block; padding: 2px 7px; border-radius: 4px; margin: 3px 0; }
  .card-dept { font-size: 12px; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-contact { font-size: 12px; color: #999; margin-top: 4px; }
  .card-ext { display: inline-block; background: #f0f4ff; color: #3a5aa0; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; }

  /* 상세 모달 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 28px; width: 340px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); position: relative; }
  .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: #aaa; }
  .modal-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; margin: 0 auto 12px; }
  .modal-name { text-align: center; font-size: 20px; font-weight: 700; }
  .modal-title { text-align: center; font-size: 13px; color: #666; margin-top: 4px; }
  .modal-divider { border: none; border-top: 1px solid #eee; margin: 16px 0; }
  .modal-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 14px; }
  .modal-label { color: #999; width: 60px; flex-shrink: 0; font-size: 13px; }
  .modal-value { color: #222; font-weight: 500; }

  /* 부서 모달 */
  .dept-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 110; align-items: flex-start; justify-content: center; padding-top: 48px; }
  .dept-modal-overlay.open { display: flex; }
  .dept-modal { background: #fff; border-radius: 16px; width: 680px; max-width: 97vw; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
  .dept-modal-header { padding: 20px 24px 14px; border-bottom: 1px solid #eee; flex-shrink: 0; }
  .dept-modal-title { font-size: 19px; font-weight: 700; color: #1a2a5e; }
  .dept-modal-sub { font-size: 13px; color: #888; margin-top: 3px; }
  .dept-modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: #aaa; }
  .dept-modal-body { overflow-y: auto; padding: 16px 24px 20px; }
  .dept-section { margin-bottom: 18px; }
  .dept-section-title { font-size: 13px; font-weight: 600; color: #4a6abf; background: #eef2ff; padding: 5px 10px; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .dept-section-title .cnt { background: #4a6abf; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 10px; }
  .dept-member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 7px; }
  .dept-member-card { background: #f8faff; border: 1px solid #e4eaf7; border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: all 0.15s; }
  .dept-member-card:hover { background: #e8eeff; border-color: #4a6abf; }
  .dept-member-name { font-size: 14px; font-weight: 600; color: #222; }
  .dept-member-info { font-size: 11px; color: #888; margin-top: 2px; }
  .dept-member-ext { font-size: 11px; color: #4a6abf; margin-top: 1px; }

  /* ───── 조직도 탭 ───── */
  #tab-tree { display: none; padding: 20px 16px 32px; }
  .org-wrap { overflow-x: auto; overflow-y: visible; }
  .org-chart-root { display: flex; flex-direction: column; align-items: center; min-width: max-content; padding: 12px 24px 32px; }
  .org-box {
    border: 1.5px solid #b0c0de; border-radius: 7px; padding: 7px 14px;
    text-align: center; cursor: pointer; transition: all 0.15s;
    background: #fff; white-space: nowrap;
  }
  .org-box:hover { box-shadow: 0 2px 10px rgba(26,58,92,0.18); }
  .org-box.level-ceo   { background: #1a3a5c; color: #fff; border-color: #1a3a5c; min-width: 130px; }
  .org-box.level-direct{ background: #c0392b; color: #fff; border-color: #96281b; min-width: 110px; }
  .org-box.level-honbu { background: #2e5fa3; color: #fff; border-color: #2e5fa3; min-width: 110px; }
  .org-box.level-cheo  { background: #e8eef8; border-color: #8fa8d0; color: #1a2a5e; }
  .org-box.level-team  { background: #f4f7fd; border-color: #c8d4e8; color: #333; }
  .org-box.highlight-tree { border-color: #f5a623 !important; box-shadow: 0 0 0 3px #f5a62340 !important; }
  .box-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .box-sub  { font-size: 11px; opacity: 0.8; margin-top: 2px; }
  .member-list { background: #f4f7fd; border: 1px solid #d0daee; border-radius: 7px; padding: 5px 7px; min-width: 100px; }
  .team-member { font-size: 11px; color: #444; padding: 2px 4px; border-radius: 3px; cursor: pointer; white-space: nowrap; display: block; }
  .team-member:hover { background: #dde8f8; color: #1a3a5c; }
  /* 연결선 */
  .conn-v  { width: 2px; background: #b0c0de; flex-shrink: 0; }
  .conn-h  { height: 2px; background: #b0c0de; flex-shrink: 0; }
  .children-wrap { display: flex; flex-direction: column; align-items: center; }
  .children-row  { display: flex; align-items: flex-start; position: relative; }
  .child-col     { display: flex; flex-direction: column; align-items: center; }
  .toggle-btn { font-size: 11px; color: #888; background: none; border: 1px solid #ddd; border-radius: 4px; padding: 2px 8px; cursor: pointer; margin-top: 4px; }

  /* 빈 결과 */
  .empty { text-align: center; padding: 60px 24px; color: #aaa; font-size: 15px; }

  /* 인쇄 */
  @media print {
    .tabs, .search-bar, .modal-overlay { display: none !important; }
    .person-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>

<div id="tab-list">

<div id="tab-tree">

</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">

    <div class="modal-name" id="m-name"></div>

// ══════════════════════════════════════
// 초기화
// ══════════════════════════════════════
let filteredData = [...DATA];

function init() {
  document.getElementById('total-count').textContent = DATA.length;
  populateFilters();
  renderCards(DATA);
  renderTree();
  // 조직도 탭이 숨겨져 있으므로 탭 전환 시 그려짐 (switchTab에서 처리)
}

function populateFilters() {
  const honbuOrder = ['임원','안전감사팀','기획홍보실','경영사업본부','개발사업본부'];
  const honbus = honbuOrder.filter(h => DATA.some(d => d.honbu === h));
  const honbuSel = document.getElementById('filterHonbu');
  honbus.forEach(h => { const o = document.createElement('option'); o.value = h; o.textContent = h; honbuSel.appendChild(o); });

  const teams = [...new Set(DATA.map(d => d.team).filter(t => t && !['임원실','기획조정실','경영사업본부','개발사업본부','경영지원처','생활체육처','개발사업처','교통레저처','기획홍보실','안전감사팀'].includes(t)))];
  const teamSel = document.getElementById('filterTeam');
  teams.sort().forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; teamSel.appendChild(o); });
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const honbu = document.getElementById('filterHonbu').value;
  const team = document.getElementById('filterTeam').value;
  const grade = document.getElementById('filterGrade').value;

  filteredData = DATA.filter(d => {
    const matchQ = !q || d.name.toLowerCase().includes(q) || d.honbu.toLowerCase().includes(q)
      || d.team.toLowerCase().includes(q) || d.grade.toLowerCase().includes(q) || d.title.toLowerCase().includes(q);
    const matchH = !honbu || d.honbu === honbu;
    const matchT = !team || d.team === team;
    const matchG = !grade || d.grade.includes(grade) || d.title.includes(grade);
    return matchQ && matchH && matchT && matchG;
  });

  renderCards(filteredData);
  document.getElementById('resultCount').textContent = `${filteredData.length}명`;
  document.getElementById('emptyMsg').style.display = filteredData.length === 0 ? 'block' : 'none';
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterHonbu').value = '';
  document.getElementById('filterTeam').value = '';
  document.getElementById('filterGrade').value = '';
  doSearch();
}

// ── 아바타 이니셜 & 색상 ──
function getGradeClass(p) {
  if (p.grade === '임원급' || p.title.includes('본부장') || p.title.includes('사장') || p.title.includes('처장') || p.title.includes('실장')) return 'grade-임원';
  if (p.grade === '팀장급' || p.title.includes('팀장')) return 'grade-팀장';
  if (p.grade === '공무직') return 'grade-공무직';
  if (p.grade === '계약직') return 'grade-계약직';
  return 'grade-일반';
}

function initials(name) { return name.slice(0, 2); }

// ── 인명부 렌더링 ──
function renderCards(list) {
  const grid = document.getElementById('personGrid');
  grid.innerHTML = list.map((p, i) => `
    <div class="person-card" onclick="openModal(${DATA.indexOf(p)})">
      <div class="avatar ${getGradeClass(p)}">${initials(p.name)}</div>
      <div class="card-info">
        <div class="card-name">${p.name}</div>
        <div class="card-title">${p.title}</div>
        <div class="card-dept">${p.honbu} · ${p.team}</div>
        <div class="card-contact">
          <span class="card-ext">☎ ${p.ext}</span>
          ${p.phone !== '-' ? `<span>${p.phone}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

// ── 모달 ──
function openModalByName(name, team) {
  const idx = DATA.findIndex(d => d.name === name && d.team === team);
  if (idx >= 0) openModal(idx);
}

function openModal(idx) {
  const p = DATA[idx];
  const cls = getGradeClass(p);
  document.getElementById('m-avatar').className = `modal-avatar avatar ${cls}`;
  document.getElementById('m-avatar').textContent = initials(p.name);
  document.getElementById('m-name').textContent = p.name;
  document.getElementById('m-title').textContent = p.title;
  document.getElementById('m-dept').textContent = `${p.honbu} › ${p.cheo || p.honbu} › ${p.team}`;
  document.getElementById('m-grade').textContent = p.grade;
  document.getElementById('m-ext').textContent = p.ext;
  document.getElementById('m-phone').textContent = p.phone;
  document.getElementById('m-chat-btn').dataset.name = p.name;
  document.getElementById('modal').classList.add('open');
}
function goChat() {
  const name = document.getElementById('m-chat-btn').dataset.name;
  if (!name) return;
  window.open('https://uucchat.vercel.app/?chatWith=' + encodeURIComponent(name), '_blank');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.currentTarget.classList.contains('modal-close'))
    document.getElementById('modal').classList.remove('open');
}

// ── 탭 전환 ──
function switchTab(t) {
  document.getElementById('tab-list').style.display = t === 'list' ? 'block' : 'none';
  document.getElementById('tab-tree').style.display = t === 'tree' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', (i === 0) === (t === 'list')));
  if (t === 'tree') setTimeout(drawConnectors, 50);
}

// ── 조직도 트리 렌더링 ──
function renderTree() {
  const wrap = document.getElementById('orgWrap');

  // ── 데이터 트리 구성 ──
  // 사장: 임원 honbu 중 team==='임원실'
  const ceo = DATA.find(d => d.team === '임원실');

  // 직속: 안전감사팀, 기획홍보실
  function makeDirectNode(honbuName) {
    const people = DATA.filter(d => d.honbu === honbuName);
    const head   = people.filter(d => d.team === honbuName);
    const teams  = [...new Set(people.map(d => d.team).filter(t => t !== honbuName))];
    if (teams.length === 0) {
      // 산하 팀 없음 (안전감사팀) - 박스 이름만 표시, 팀원 목록은 유지
      return { name: honbuName, level: 'direct', head: [], members: people };
    }
    // 산하 팀 있음 (기획홍보실)
    return {
      name: honbuName, level: 'direct', head,
      children: teams.map(t => ({
        name: t, level: 'team',
        members: people.filter(d => d.team === t)
      }))
    };
  }

  // 본부 노드 생성
  function makeHonbuNode(honbuName) {
    const people = DATA.filter(d => d.honbu === honbuName);
    const head   = people.filter(d => d.team === honbuName);
    const cheoNames = [...new Set(people.map(d => d.cheo).filter(c => c !== honbuName))];
    return {
      name: honbuName, level: 'honbu', head,
      children: cheoNames.map(c => {
        const cPeople = people.filter(d => d.cheo === c);
        const cheoHead = cPeople.filter(d => d.team === c);
        const teamNames = [...new Set(cPeople.map(d => d.team).filter(t => t !== c && t !== honbuName))];
        return {
          name: c, level: 'cheo', head: cheoHead,
          children: teamNames.map(t => ({
            name: t, level: 'team',
            members: cPeople.filter(d => d.team === t)
          }))
        };
      })
    };
  }

  const treeData = {
    name: '의왕도시공사', level: 'ceo',
    ext: ceo ? ceo.ext : '7300',
    ceo: ceo,
    // 사장 직속: 안전감사팀, 기획홍보실
    directs: ['안전감사팀', '기획홍보실'].map(makeDirectNode),
    // 본부
    honbus: ['경영사업본부', '개발사업본부'].map(makeHonbuNode)
  };

  wrap.innerHTML = `<div class="org-chart-root">${buildTreeHTML(treeData)}</div>`;
}

// ── 노드 HTML 빌더 (재귀) ──
function buildTreeHTML(node) {
  const VH = 20; // 수직선 높이(px)

  function headSpan(people) {
    return people.map(p => {
      const n = p.name.replace(/'/g,"&#39;");
      const t = p.team.replace(/'/g,"&#39;");
      return `<span onclick="event.stopPropagation();openModalByName('${n}','${t}')" style="cursor:pointer;text-decoration:underline dotted;">${p.name}</span>`;
    }).join(', ');
  }

  function boxHtml(name, level, head, ext, clickFn) {
    const hs = head && head.length ? `<div class="box-sub">${headSpan(head)}</div>` : '';
    const es = ext ? `<div class="box-sub">${ext}</div>` : '';
    return `<div class="org-box level-${level}" onclick="${clickFn}">${
      `<div class="box-name">${name}</div>${hs}${es}`
    }</div>`;
  }

  function memberListHtml(members) {
    if (!members || !members.length) return '';
    return `<div class="conn-v" style="height:${VH}px"></div>
    <div class="member-list">${members.map(m =>
      `<div class="team-member" onclick="openModal(${DATA.indexOf(m)})">${m.name} <span style="color:#aaa;font-size:10px">${m.grade}</span></div>`
    ).join('')}</div>`;
  }

  // 자식 행 + 연결선 렌더
  function childrenHtml(children, nextBuilderFn) {
    if (!children || !children.length) return '';
    const cols = children.map(c => nextBuilderFn(c));
    if (cols.length === 1) {
      // 자식 1개 → 단순 수직선
      return `<div class="conn-v" style="height:${VH}px"></div>${cols[0]}`;
    }
    // 자식 여러 개 → 가로선 + 수직선 분기
    // 각 자식을 child-col 으로 감싸고 수평 연결선은 SVG로 처리
    const colsHtml = cols.map(c =>
      `<div class="child-col" style="padding:0 10px">
        <div class="conn-v" style="height:${VH}px"></div>
        ${c}
      </div>`
    ).join('');
    return `
      <div class="conn-v" style="height:${VH}px"></div>
      <div style="position:relative">
        <div class="children-row" id="cr_${Math.random().toString(36).slice(2)}">${colsHtml}</div>
      </div>`;
  }

  // ── 팀 노드 ──
  function teamNode(node) {
    const esc = node.name.replace(/'/g,"&#39;");
    const box = boxHtml(node.name, 'team', null, null, `openDeptModal('${esc}','team')`);
    return `<div style="display:flex;flex-direction:column;align-items:center">${box}${memberListHtml(node.members)}</div>`;
  }

  // ── 처 노드 ──
  function cheoNode(node) {
    const esc = node.name.replace(/'/g,"&#39;");
    const box = boxHtml(node.name, 'cheo', node.head, null, `openDeptModal('${esc}','cheo')`);
    const kids = childrenHtml(node.children, teamNode);
    return `<div style="display:flex;flex-direction:column;align-items:center">${box}${kids}</div>`;
  }

  // ── 본부 노드 ──
  function honbuNode(node) {
    const esc = node.name.replace(/'/g,"&#39;");
    const box = boxHtml(node.name, 'honbu', node.head, null, `openDeptModal('${esc}','honbu')`);
    const kids = childrenHtml(node.children, cheoNode);
    return `<div style="display:flex;flex-direction:column;align-items:center">${box}${kids}</div>`;
  }

  // ── 직속(안전감사팀/기획홍보실) 노드 ──
  function directNode(node) {
    const esc = node.name.replace(/'/g,"&#39;");
    const box = boxHtml(node.name, 'direct', node.head, null, `openDeptModal('${esc}','honbu')`);
    if (node.members) {
      // 안전감사팀 등 팀 자체가 말단
      return `<div style="display:flex;flex-direction:column;align-items:center">${box}${memberListHtml(node.members)}</div>`;
    }
    const kids = childrenHtml(node.children, teamNode);
    return `<div style="display:flex;flex-direction:column;align-items:center">${box}${kids}</div>`;
  }

  // ── 최상위: 사장 ──
  const ceoClick = node.ceo ? `openModal(${DATA.indexOf(node.ceo)})` : '';
  const ceoBox = `<div class="org-box level-ceo" onclick="${ceoClick}" style="cursor:pointer">
    <div class="box-name">의왕도시공사</div>
    ${node.ext ? `<div class="box-sub">${node.ext}</div>` : ''}
  </div>`;

  // 사장 아래: 직속 + 본부를 한 행으로
  const allChildren = [...node.directs, ...node.honbus];
  const allCols = allChildren.map(c => {
    const isHonbu = c.level === 'honbu';
    const inner = isHonbu ? honbuNode(c) : directNode(c);
    return `<div class="child-col" style="padding:0 10px">
      <div class="conn-v" style="height:${VH}px"></div>
      ${inner}
    </div>`;
  });

  // 수평 연결선 구현: 가로 절대 배치 div
  const rowId = 'toprow';
  const rowHtml = `
    <div class="conn-v" style="height:${VH}px"></div>
    <div style="position:relative">
      <div class="children-row" id="${rowId}">${allCols.join('')}</div>
    </div>`;

  return `<div style="display:flex;flex-direction:column;align-items:center">
    ${ceoBox}${rowHtml}
  </div>`;
}

// 수평 연결선을 렌더 후 DOM에 그리기
function drawConnectors() {
  document.querySelectorAll('.children-row').forEach(row => {
    const cols = row.querySelectorAll(':scope > .child-col');
    if (cols.length < 2) return;
    const rowRect = row.getBoundingClientRect();
    const firstConnV = cols[0].querySelector(':scope > .conn-v');
    const lastConnV  = cols[cols.length-1].querySelector(':scope > .conn-v');
    if (!firstConnV || !lastConnV) return;
    const firstRect = firstConnV.getBoundingClientRect();
    const lastRect  = lastConnV.getBoundingClientRect();
    const y = firstRect.top - rowRect.top + firstRect.height / 2;
    const x1 = firstRect.left - rowRect.left + firstRect.width / 2;
    const x2 = lastRect.left  - rowRect.left + lastRect.width  / 2;
    // 기존 선 제거
    row.querySelectorAll(':scope > .h-connector').forEach(e => e.remove());
    const line = document.createElement('div');
    line.className = 'h-connector';
    line.style.cssText = `position:absolute;top:${y}px;left:${x1}px;width:${x2-x1}px;height:2px;background:#b0c0de;pointer-events:none;`;
    row.appendChild(line);
  });
}

// ── 부서 모달 ──
function openDeptModal(deptName, level) {
  // level: 'honbu' | 'cheo' | 'team'
  let members = [];
  if (level === 'honbu') {
    members = DATA.filter(d => d.honbu === deptName);
  } else if (level === 'cheo') {
    members = DATA.filter(d => d.cheo === deptName);
  } else {
    members = DATA.filter(d => d.team === deptName);
  }

  // 팀별로 그룹핑
  const groups = {};
  members.forEach(m => {
    const key = (level === 'team') ? deptName : m.team;
    if (!groups[key]) groups[key] = [];
    groups[key].push(m);
  });

  document.getElementById('dm-title').textContent = deptName;
  document.getElementById('dm-sub').textContent = `총 ${members.length}명`;

  let bodyHtml = '';
  Object.entries(groups).forEach(([teamName, ppl]) => {
    const label = (level === 'honbu' || level === 'cheo') ? teamName : '';
    if (label) {
      bodyHtml += `<div class="dept-section">
        <div class="dept-section-title">${label}<span class="cnt">${ppl.length}</span></div>
        <div class="dept-member-grid">`;
    } else {
      bodyHtml += `<div class="dept-section"><div class="dept-member-grid">`;
    }
    ppl.forEach(p => {
      const idx = DATA.indexOf(p);
      bodyHtml += `<div class="dept-member-card" onclick="closeDeptModal();openModal(${idx})">
        <div class="dept-member-name">${p.name}</div>
        <div class="dept-member-info">${p.title}</div>
        ${p.ext && p.ext !== '-' ? `<div class="dept-member-ext">☎ ${p.ext}</div>` : ''}
      </div>`;
    });
    bodyHtml += `</div></div>`;
  });

  document.getElementById('dm-body').innerHTML = bodyHtml;
  document.getElementById('deptModal').classList.add('open');
}

function closeDeptModal(e) {
  if (!e || e.target === document.getElementById('deptModal') || e.currentTarget.classList.contains('dept-modal-close'))
    document.getElementById('deptModal').classList.remove('open');
}

function highlightNode(el, name) {
  document.querySelectorAll('.org-box').forEach(b => b.classList.remove('highlight-tree'));
  el.classList.add('highlight-tree');
  document.getElementById('searchInput').value = name;
  doSearch();
  switchTab('list');
}

init();
